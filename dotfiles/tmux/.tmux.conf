##### PREFIX #########################################################

# Remove default prefix
unbind C-b

# Use Ctrl-Space as prefix
set -g prefix C-Space
bind C-Space send-prefix

##### GENERAL ########################################################

# Enable mouse support
set -g mouse on

# Vi-style copy mode
setw -g mode-keys vi

# Bigger scrollback
set -g history-limit 10000

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows after closing one
set -g renumber-windows on

# Faster escape response
set -sg escape-time 10

# Better focus handling
set -g focus-events on

# Keep pane/window names stable unless you rename manually
set -g allow-rename off

# Keep tmux running if last pane/window closes
set -g detach-on-destroy off

# Clipboard integration if supported by terminal
set -g set-clipboard on

##### SPLITS #########################################################

# Remove default split keys
unbind '"'
unbind %

# Split and keep current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### PANE NAVIGATION ################################################

# Prefix + Arrow = move between panes
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Ctrl + Arrow = move between panes without prefix
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

##### PANE RESIZING ##################################################

# Prefix + Shift + Arrow = resize panes
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# Optional: Alt + Shift + Arrow = resize without prefix
bind -n M-S-Left  resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up    resize-pane -U 5
bind -n M-S-Down  resize-pane -D 5

##### PANE MANAGEMENT ################################################

# Toggle zoom for current pane
unbind z
bind m resize-pane -Z

# Kill current pane
bind x kill-pane

# Show pane numbers
bind q display-panes

##### WINDOWS ########################################################

# New window in same working directory
bind c new-window -c "#{pane_current_path}"

# Rename current window
bind w command-prompt -I "#W" "rename-window '%%'"

# Last window
bind Tab last-window

# Cycle windows with prefix
bind n next-window
bind p previous-window

# Alt + Arrow = cycle windows without prefix
bind -n M-Left  previous-window
bind -n M-Right next-window

##### SESSIONS #######################################################

# Rename current session
bind R command-prompt -I "#S" "rename-session '%%'"

# Create new named session
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Cycle sessions
bind N switch-client -n
bind P switch-client -p

##### COPY MODE ######################################################

# Enter copy mode
bind [ copy-mode

# Vi copy-mode bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle

##### RELOAD CONFIG ##################################################

bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

##### STATUS BAR #####################################################

set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

# Left side: session name
set -g status-left "#[bold] #S "

# Right side: zoom indicator + date/time
set -g status-right "#{?window_zoomed_flag,#[fg=yellow]ZOOM ,}#[fg=green]%Y-%m-%d #[fg=cyan]%H:%M "

# Window list
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W "

##### AUTO WINDOW NAMES ##############################################

# Auto-name windows from current process
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_command}"

##### TPM ############################################################

# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Plugin list goes above this line
run '~/.tmux/plugins/tpm/tpm'
